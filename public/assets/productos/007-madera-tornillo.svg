<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="Madera Tornillo">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e7edf3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#b7773b"/>
      <stop offset="1" stop-color="#1f6f8f"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#1b2b38" flood-opacity=".20"/>
    </filter>
    <style>
      .line{fill:none;stroke:#263947;stroke-width:14;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#263947;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .label{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#263947;letter-spacing:1px}
      .small{font-family:Arial,Helvetica,sans-serif;font-weight:700;fill:#5b6b76}
    </style>
  </defs>
  <rect width="900" height="600" fill="url(#bg)"/>
  <circle cx="745" cy="100" r="115" fill="#b7773b" opacity=".12"/>
  <circle cx="120" cy="500" r="130" fill="#19a7ce" opacity=".10"/>
  <ellipse cx="450" cy="505" rx="330" ry="45" fill="#1b2b38" opacity=".10"/>

  <g filter="url(#shadow)">
    <path d="M230 195h420l50 46H280z" fill="#b7773b" stroke="#263947" stroke-width="8" join="round"/><path d="M292 213c88 18 188-14 288 10" class="thin" stroke="#71451f" opacity=".55"/><path d="M230 255h420l50 46H280z" fill="#b7773b" stroke="#263947" stroke-width="8" join="round"/><path d="M292 273c88 18 188-14 288 10" class="thin" stroke="#71451f" opacity=".55"/><path d="M230 315h420l50 46H280z" fill="#b7773b" stroke="#263947" stroke-width="8" join="round"/><path d="M292 333c88 18 188-14 288 10" class="thin" stroke="#71451f" opacity=".55"/><path d="M230 375h420l50 46H280z" fill="#b7773b" stroke="#263947" stroke-width="8" join="round"/><path d="M292 393c88 18 188-14 288 10" class="thin" stroke="#71451f" opacity=".55"/>
    <text x="450" y="490" font-size="36" text-anchor="middle" class="label">MADERA TORNILLO</text>
  </g>
