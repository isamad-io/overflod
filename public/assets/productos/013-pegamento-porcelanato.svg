<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="Pegamento para Porcelanato">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e7edf3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d58a36"/>
      <stop offset="1" stop-color="#1f6f8f"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#1b2b38" flood-opacity=".20"/>
    </filter>
    <style>
      .line{fill:none;stroke:#263947;stroke-width:14;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#263947;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .label{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#263947;letter-spacing:1px}
      .small{font-family:Arial,Helvetica,sans-serif;font-weight:700;fill:#5b6b76}
    </style>
  </defs>
  <rect width="900" height="600" fill="url(#bg)"/>
  <circle cx="745" cy="100" r="115" fill="#d58a36" opacity=".12"/>
  <circle cx="120" cy="500" r="130" fill="#19a7ce" opacity=".10"/>
  <ellipse cx="450" cy="505" rx="330" ry="45" fill="#1b2b38" opacity=".10"/>

  <g filter="url(#shadow)">
    <path d="M310 170h260l38 290H272z" fill="#e6e0d6" stroke="#263947" stroke-width="10" join="round"/>
    <path d="M332 250h216v92H332z" fill="#d58a36"/>
    <text x="440" y="306" font-size="32" text-anchor="middle" class="label" fill="#fff">PORCELANATO</text>
    <g transform="translate(570 355) rotate(-24)">
      <rect x="0" y="0" width="150" height="42" rx="14" fill="#cfd7df" stroke="#263947" stroke-width="7"/>
      <path d="M125 42v40M96 42v32M67 42v40M38 42v32" class="thin" stroke="#263947"/>
    </g>
  </g>
</svg>
