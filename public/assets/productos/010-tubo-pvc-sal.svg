      <rect x="210" y="230" width="500" height="94" rx="47.0" fill="#d58a36" stroke="#263947" stroke-width="9"/>
      <ellipse cx="710" cy="277.0" rx="34" ry="47.0" fill="#f8fbff" stroke="#263947" stroke-width="9"/>
      <ellipse cx="710" cy="277.0" rx="18" ry="27.0" fill="#d9e3e8"/>
      <rect x="250" y="344" width="390" height="66" rx="24" fill="#f8fbff" stroke="#263947" stroke-width="8"/>
      <ellipse cx="640" cy="361" rx="24" ry="32.0" fill="#e7edf3" stroke="#263947" stroke-width="8"/>
    </g>
    <text x="450" y="490" font-size="38" text-anchor="middle" class="label">PVC SAL 4 IN</text>
